<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app" class="hidden">
    <div class="frame">
      <div class="header">
        <div>
          <h1>TC5 Doorlock Manager</h1>
          <p>Create or edit doors and roller shutters in game</p>
        </div>
        <button id="close" class="btn secondary">Close</button>
      </div>

      <div id="manager-view" class="manager-view">
        <div class="toolbar">
          <button id="create-door" class="btn">Create Door From Aim</button>
        </div>
        <div class="list-layout">
          <div class="card list-card">
            <div class="section-title">Saved Doors</div>
            <input id="search" class="input" placeholder="Search by id or name">
            <div id="door-list" class="door-list"></div>
          </div>
        </div>
      </div>

      <div id="editor-view" class="editor-view hidden">
        <div class="toolbar">
          <button id="back-manager" class="btn secondary">Back</button>
        </div>

        <div class="grid">
          <div class="card stack">
            <div class="section-title">Door Settings</div>
            <label>Name</label><input id="name" class="input" />
            <label>Model</label><input id="model" class="input" />
            <label>Door Type</label>
            <select id="doorType" class="input">
              <option value="standard">Standard Door</option>
              <option value="roller">Roller Shutter</option>
            </select>
            <label>Roller Open Ratio</label><input id="rollerOpenRatio" class="input" type="number" step="0.1" />
            <label>Locked by default</label>
            <select id="locked" class="input"><option value="true">Locked</option><option value="false">Unlocked</option></select>
            <label>Double door</label>
            <select id="double" class="input"><option value="false">No</option><option value="true">Yes</option></select>
            <label>Interact distance</label><input id="distance" class="input" type="number" step="0.1" />
            <label>Door rate</label><input id="doorRate" class="input" type="number" step="0.1" />
          </div>

          <div class="card stack">
            <div class="section-title">Access Control</div>
            <label>Jobs access JSON</label><textarea id="jobs" class="textarea" placeholder='{"police":0,"mechanic":0}'></textarea>
            <label>Gangs access JSON</label><textarea id="gangs" class="textarea" placeholder='{"ballas":0}'></textarea>
            <label>Character access JSON</label><textarea id="characters" class="textarea" placeholder='{"12":true,"44":true}'></textarea>
          </div>
        </div>

        <div class="actions">
          <button id="save" class="btn">Save Door</button>
          <button id="delete" class="btn danger">Delete Door</button>
        </div>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>

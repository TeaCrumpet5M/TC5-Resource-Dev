<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TC5 Tablet</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="tablet" class="tablet hidden">
    <div class="shell">
      <div class="topbar">
        <div>
          <div class="brand">TC5</div>
          <div class="subtitle" id="subtitle">Tablet OS</div>
        </div>
        <button id="closeBtn">Close</button>
      </div>

      <div id="homeView" class="view">
        <div class="sectionTitle">Installed apps</div>
        <div id="apps" class="apps"></div>
      </div>

      <div id="boostingView" class="view hidden">
        <button class="backBtn" data-back="home">← Back</button>
        <div class="sectionTitle">Boosting</div>
        <div id="boostingSummary" class="card"></div>
        <div id="boostContracts" class="stack"></div>
        <div class="actionsRow">
          <button id="startBoostBtn">Request Contract</button>
        </div>
      </div>

      <div id="mechanicView" class="view hidden">
        <button class="backBtn" data-back="home">← Back</button>
        <div class="sectionTitle">Mechanic Console</div>
        <div class="actionsRow">
          <button id="scanVehicleBtn">Scan nearby vehicle</button>
          <button id="toggleDutyBtn">Toggle duty</button>
          <button id="showCraftingBtn">Crafting</button>
        </div>
        <div id="mechanicStatus" class="statusLine">Waiting for scan…</div>
        <div id="diagnosticPanel" class="stack"></div>
        <div id="repairButtons" class="actionsRow wrap"></div>
        <div id="craftingPanel" class="stack hidden"></div>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>

<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="creator" class="hidden">
    <div class="bg"></div>
    <div class="panel">
      <div class="tag">TC5 CHARACTER CREATOR</div>
      <h1>Create Your Character</h1>
      <p>Pick a clean identity to start your journey. Your first spawn will be your starter apartment.</p>
      <div class="fields">
        <label>First Name<input id="firstName" maxlength="24" placeholder="John"></label>
        <label>Last Name<input id="lastName" maxlength="24" placeholder="Doe"></label>
      </div>
      <div class="actions">
        <button id="cancel" class="ghost">Cancel</button>
        <button id="save">Create Character</button>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
